<!-- Team: Grid Layout -->
<section class="team-grid block-double-tb" id="team" aria-labelledby="team-heading">
    <div class="inner" style="padding-inline: var(--space-s);">

        <header class="section-header text-center mb-double">
            <span class="section-label">Our Team</span>
            <h2 class="section-title" id="team-heading">Meet the Experts</h2>
            <p class="section-subtitle">
                Passionate professionals dedicated to your success
            </p>
        </header>

        <div class="team-container grid-4">
            <Loop type=team orderby=menu_order order=ASC>
                <article class="team-member">
                    <figure class="team-photo mb-none">
                        <If field=photo>
                            <img src="{Field photo size=medium}"
                                 alt=""
                                 loading="lazy"
                                 width="300"
                                 height="350">
                        <Else />
                            <img src="/assets/images/avatar-placeholder.jpg"
                                 alt=""
                                 loading="lazy"
                                 width="300"
                                 height="350">
                        </If>
                        <div class="team-overlay">
                            <nav class="team-social" aria-label="Social links for {Field name}">
                                <If field=linkedin>
                                    <a href="{Field linkedin}" aria-label="LinkedIn" target="_blank" rel="noopener">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
                                    </a>
                                </If>
                                <If field=twitter>
                                    <a href="{Field twitter}" aria-label="Twitter" target="_blank" rel="noopener">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/></svg>
                                    </a>
                                </If>
                                <If field=email>
                                    <a href="mailto:{Field email}" aria-label="Email">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                                    </a>
                                </If>
                            </nav>
                        </div>
                    </figure>
                    <div class="team-info">
                        <h3 class="team-name mb-small"><Field name /></h3>
                        <span class="team-role"><Field role /></span>
                    </div>
                </article>
            </Loop>
        </div>

        <!-- Join Team CTA -->
        <aside class="team-cta mt-double text-center">
            <div class="team-cta-content" style="max-width: 600px; margin-inline: auto;">
                <h3 class="team-cta-title mb-half">Join Our Team</h3>
                <p class="team-cta-text mb-single">
                    We're always looking for talented individuals to join our growing team.
                    Check out our current openings.
                </p>
                <a href="/careers/" class="button button-primary">
                    View Open Positions
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </a>
            </div>
        </aside>

    </div>
</section>
