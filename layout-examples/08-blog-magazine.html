<!-- Blog: Magazine Style Layout
     Usage: [template name=blog-magazine]
     BEM Block: .magazine
-->

<style>
/* Magazine Block */
.magazine {
    padding: 4rem 1.5rem;
    background: #fff;
}

.magazine__container {
    max-width: 1200px;
    margin-inline: auto;
}

/* Header Element */
.magazine__header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 2.5rem;
    padding-bottom: 1rem;
    border-bottom: 3px solid #0f172a;
}

.magazine__title {
    font-size: 1.75rem;
    font-weight: 800;
    color: #0f172a;
    margin: 0;
    text-transform: uppercase;
    letter-spacing: -0.02em;
}

.magazine__date {
    font-size: 0.938rem;
    color: #64748b;
}

/* Top Section */
.magazine__top {
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: 2rem;
    margin-bottom: 3rem;
}

/* Lead Story */
.magazine__lead {
    position: relative;
}

.magazine__lead-link {
    display: block;
    text-decoration: none;
    color: inherit;
}

.magazine__lead-image {
    margin: 0;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
}

.magazine__lead-image img {
    display: block;
    width: 100%;
    height: auto;
    transition: transform 0.4s ease;
}

.magazine__lead-link:hover .magazine__lead-image img {
    transform: scale(1.03);
}

.magazine__lead-content {
    padding: 1.5rem 0;
}

.magazine__category {
    display: inline-block;
    padding: 0.25rem 0.75rem;
    background: #ef4444;
    color: #fff;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-radius: 2px;
    margin-bottom: 0.75rem;
}

.magazine__category--small {
    padding: 0.125rem 0.5rem;
    font-size: 0.688rem;
}

.magazine__lead-title {
    font-size: clamp(1.5rem, 3vw, 2rem);
    font-weight: 800;
    line-height: 1.2;
    color: #0f172a;
    margin: 0 0 0.75rem;
    letter-spacing: -0.02em;
}

.magazine__lead-excerpt {
    font-size: 1rem;
    line-height: 1.7;
    color: #64748b;
    margin: 0 0 1rem;
}

.magazine__byline {
    font-size: 0.875rem;
    color: #94a3b8;
}

/* Secondary Stories */
.magazine__secondary {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
}

.magazine__secondary-article {
    border-bottom: 1px solid #f1f5f9;
    padding-bottom: 1.5rem;
}

.magazine__secondary-article:last-child {
    border-bottom: none;
    padding-bottom: 0;
}

.magazine__secondary-link {
    display: block;
    text-decoration: none;
    color: inherit;
}

.magazine__secondary-image {
    margin: 0 0 1rem;
    border-radius: 8px;
    overflow: hidden;
    aspect-ratio: 16 / 10;
}

.magazine__secondary-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
}

.magazine__secondary-link:hover .magazine__secondary-image img {
    transform: scale(1.05);
}

.magazine__secondary-title {
    font-size: 1.0625rem;
    font-weight: 700;
    line-height: 1.35;
    color: #0f172a;
    margin: 0 0 0.5rem;
}

.magazine__secondary-link:hover .magazine__secondary-title {
    color: #6366f1;
}

/* Category Sections */
.magazine__sections {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2rem;
    padding-top: 2.5rem;
    border-top: 2px solid #f1f5f9;
}

.magazine__section-title {
    font-size: 0.938rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #0f172a;
    margin: 0 0 1.25rem;
    padding-bottom: 0.75rem;
    border-bottom: 2px solid #0f172a;
}

.magazine__section-title a {
    display: flex;
    justify-content: space-between;
    align-items: center;
    text-decoration: none;
    color: inherit;
    transition: color 0.2s ease;
}

.magazine__section-title a:hover {
    color: #6366f1;
}

.magazine__section-list {
    list-style: none;
    padding: 0;
    margin: 0;
}

.magazine__section-item {
    padding: 0.75rem 0;
    border-bottom: 1px solid #f1f5f9;
}

.magazine__section-item:last-child {
    border-bottom: none;
}

.magazine__section-item a {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    text-decoration: none;
    color: inherit;
}

.magazine__item-title {
    font-size: 0.875rem;
    font-weight: 600;
    line-height: 1.4;
    color: #334155;
    transition: color 0.2s ease;
}

.magazine__section-item a:hover .magazine__item-title {
    color: #6366f1;
}

.magazine__item-date {
    font-size: 0.75rem;
    color: #94a3b8;
    white-space: nowrap;
}

/* Ticker Element */
.magazine__ticker {
    display: flex;
    align-items: center;
    margin-top: 2.5rem;
    padding: 1rem 0;
    border-top: 2px solid #ef4444;
    overflow: hidden;
}

.magazine__ticker-label {
    flex-shrink: 0;
    padding: 0.375rem 1rem;
    background: #ef4444;
    color: #fff;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.magazine__ticker-content {
    flex: 1;
    overflow: hidden;
    margin-left: 1rem;
}

.magazine__ticker-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    animation: ticker 30s linear infinite;
}

.magazine__ticker-list li {
    white-space: nowrap;
    padding: 0 2rem;
}

.magazine__ticker-list a {
    font-size: 0.875rem;
    font-weight: 600;
    color: #0f172a;
    text-decoration: none;
    transition: color 0.2s ease;
}

.magazine__ticker-list a:hover {
    color: #ef4444;
}

@keyframes ticker {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
}

/* Responsive */
@media (max-width: 900px) {
    .magazine__top {
        grid-template-columns: 1fr;
    }

    .magazine__secondary {
        flex-direction: row;
        gap: 1.5rem;
    }

    .magazine__secondary-article {
        flex: 1;
        border-bottom: none;
        padding-bottom: 0;
    }

    .magazine__sections {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 640px) {
    .magazine {
        padding: 3rem 1rem;
    }

    .magazine__header {
        flex-direction: column;
        gap: 0.5rem;
    }

    .magazine__secondary {
        flex-direction: column;
    }

    .magazine__sections {
        grid-template-columns: 1fr;
    }

    .magazine__ticker {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.75rem;
    }

    .magazine__ticker-content {
        margin-left: 0;
    }
}
</style>

<section class="magazine" aria-labelledby="magazine-heading">
    <div class="magazine__container">

        <header class="magazine__header">
            <h2 class="magazine__title" id="magazine-heading">Today's Picks</h2>
            <time class="magazine__date" datetime="{Date format='Y-m-d'}">
                <Date format="l, F j, Y" />
            </time>
        </header>

        <div class="magazine__top">

            <!-- Lead Story -->
            <div class="magazine__lead">
                <Loop type=post count=1 orderby=date order=DESC>
                    <article>
                        <a href="{Field url}" class="magazine__lead-link">
                            <figure class="magazine__lead-image">
                                <If field=image_url>
                                    <img src="{Field image_url size=large}"
                                         alt="{Field image_alt}"
                                         loading="eager"
                                         width="800"
                                         height="500">
                                </If>
                            </figure>
                            <div class="magazine__lead-content">
                                <If field=terms taxonomy=category>
                                    <span class="magazine__category">
                                        <Field terms taxonomy=category count=1 />
                                    </span>
                                </If>
                                <h3 class="magazine__lead-title">
                                    <Field title />
                                </h3>
                                <p class="magazine__lead-excerpt">
                                    <Field excerpt words=30 />
                                </p>
                                <span class="magazine__byline">
                                    By <Field author_name /> &bull;
                                    <Field reading_time /> min read
                                </span>
                            </div>
                        </a>
                    </article>
                </Loop>
            </div>

            <!-- Secondary Stories -->
            <div class="magazine__secondary">
                <Loop type=post count=2 offset=1 orderby=date order=DESC>
                    <article class="magazine__secondary-article">
                        <a href="{Field url}" class="magazine__secondary-link">
                            <figure class="magazine__secondary-image">
                                <If field=image_url>
                                    <img src="{Field image_url size=medium}"
                                         alt="{Field image_alt}"
                                         loading="lazy"
                                         width="400"
                                         height="250">
                                </If>
                            </figure>
                            <div class="magazine__secondary-content">
                                <If field=terms taxonomy=category>
                                    <span class="magazine__category magazine__category--small">
                                        <Field terms taxonomy=category count=1 />
                                    </span>
                                </If>
                                <h3 class="magazine__secondary-title">
                                    <Field title />
                                </h3>
                                <span class="magazine__byline">
                                    <Field author_name />
                                </span>
                            </div>
                        </a>
                    </article>
                </Loop>
            </div>

        </div>

        <!-- Category Sections -->
        <div class="magazine__sections">

            <Loop taxonomy=category count=4 orderby=count order=DESC>
                <div class="magazine__section">
                    <h3 class="magazine__section-title">
                        <a href="{Field url}">
                            <Field title />
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                <path d="M5 12h14M12 5l7 7-7 7"/>
                            </svg>
                        </a>
                    </h3>

                    <ul class="magazine__section-list">
                        <Loop type=post taxonomy=category terms="{Field slug}" count=4>
                            <li class="magazine__section-item">
                                <a href="{Field url}">
                                    <span class="magazine__item-title">
                                        <Field title />
                                    </span>
                                    <time class="magazine__item-date" datetime="{Field publish_date date_format='Y-m-d'}">
                                        <Field publish_date date_format="M j" />
                                    </time>
                                </a>
                            </li>
                        </Loop>
                    </ul>
                </div>
            </Loop>

        </div>

        <!-- Breaking News Ticker -->
        <aside class="magazine__ticker" aria-label="Breaking news">
            <span class="magazine__ticker-label">Breaking</span>
            <div class="magazine__ticker-content">
                <ul class="magazine__ticker-list js-ticker">
                    <Loop type=post count=5 custom_field=breaking custom_field_value=1>
                        <li>
                            <a href="{Field url}"><Field title /></a>
                        </li>
                    </Loop>
                </ul>
            </div>
        </aside>

    </div>
</section>

<script>
(function() {
    // Duplicate ticker items for seamless loop
    const ticker = document.querySelector('.js-ticker');
    if (ticker) {
        ticker.innerHTML += ticker.innerHTML;
    }

    // Pause ticker on hover
    const tickerContainer = document.querySelector('.magazine__ticker-content');
    if (tickerContainer) {
        tickerContainer.addEventListener('mouseenter', () => {
            ticker.style.animationPlayState = 'paused';
        });
        tickerContainer.addEventListener('mouseleave', () => {
            ticker.style.animationPlayState = 'running';
        });
    }
})();
</script>
