<!-- Related Posts: Multiple Layouts
     Usage: [template name=related-posts]
     BEM Block: .related
-->

<style>
/* Related Block */
.related {
    padding: 4rem 1.5rem;
    background: #f8fafc;
}

.related__container {
    max-width: 1200px;
    margin-inline: auto;
}

/* Header */
.related__header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
}

.related__title {
    font-size: clamp(1.5rem, 2.5vw, 1.875rem);
    font-weight: 800;
    color: #0f172a;
    margin: 0;
}

.related__link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.9375rem;
    font-weight: 600;
    color: #6366f1;
    text-decoration: none;
    transition: gap 0.2s ease;
}

.related__link:hover {
    gap: 0.75rem;
}

/* Grid */
.related__grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 2rem;
}

/* Card */
.related__card {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    transition: all 0.3s ease;
}

.related__card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 16px rgba(0,0,0,0.1);
}

.related__card-link {
    display: block;
    text-decoration: none;
    color: inherit;
}

.related__image {
    aspect-ratio: 16 / 9;
    background: #e2e8f0;
    overflow: hidden;
    margin: 0;
}

.related__image img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
}

.related__card:hover .related__image img {
    transform: scale(1.05);
}

.related__content {
    padding: 1.5rem;
}

.related__category {
    display: inline-block;
    font-size: 0.8125rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #6366f1;
    margin-bottom: 0.75rem;
}

.related__card-title {
    font-size: 1.125rem;
    font-weight: 700;
    line-height: 1.3;
    color: #0f172a;
    margin: 0 0 0.75rem;
}

.related__meta {
    display: flex;
    align-items: center;
    gap: 1rem;
    font-size: 0.875rem;
    color: #64748b;
}

.related__date {
    display: flex;
    align-items: center;
    gap: 0.375rem;
}

/* Responsive */
@media (max-width: 900px) {
    .related {
        padding: 3rem 1rem;
    }

    .related__grid {
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.5rem;
    }
}

@media (max-width: 640px) {
    .related {
        padding: 2rem 1rem;
    }

    .related__header {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
    }

    .related__grid {
        grid-template-columns: 1fr;
    }
}
</style>

<section class="related" aria-labelledby="related-heading">
    <div class="related__container">

        <header class="related__header">
            <h2 class="related__title" id="related-heading">You Might Also Like</h2>
            <a href="/blog/" class="related__link">
                View all posts
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </a>
        </header>

        <div class="related__grid">
            <Loop type=post taxonomy=category terms="{Field terms taxonomy=category field=slug}" count=3 exclude="{Field id}">
                <article class="related__card">
                    <a href="{Field url}" class="related__card-link">
                        <figure class="related__image">
                            <If field=image_url>
                                <img src="{Field image_url size=medium}"
                                     alt="{Field image_alt}"
                                     loading="lazy"
                                     width="350"
                                     height="200">
                            </If>
                        </figure>
                        <div class="related__content">
                            <If field=terms taxonomy=category>
                                <span class="related__category">
                                    <Field terms taxonomy=category count=1 />
                                </span>
                            </If>
                            <h3 class="related__card-title"><Field title /></h3>
                            <div class="related__meta">
                                <time class="related__date" datetime="{Field publish_date date_format='Y-m-d'}">
                                    <Field publish_date date_format="M j, Y" />
                                </time>
                                <span><Field reading_time /> min read</span>
                            </div>
                        </div>
                    </a>
                </article>
            </Loop>
        </div>

    </div>
</section>
