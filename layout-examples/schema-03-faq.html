<!-- Schema: FAQPage
     Usage: [template name=schema-faq]
     Works on: Pages/posts with FAQ custom field (repeater with question/answer)
     Expects: ACF repeater field 'faqs' with 'question' and 'answer' subfields
-->
<Set schema_json>{
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
        <Loop type=post id=current>
            <Loop field=faqs>
                <If field=question>
        {
            "@type": "Question",
            "name": "<Field question />",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "<Field answer />"
            }
        }<If not check="{Field loop_last}" value="true">,</If>
                </If>
            </Loop>
        </Loop>
    ]
}</Set>
<Raw><script type="application/ld+json"></Raw><Get schema_json /><Raw></script></Raw>
