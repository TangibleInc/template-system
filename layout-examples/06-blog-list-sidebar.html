<!-- Blog: List Layout with Sidebar
     Usage: [template name=blog-list-sidebar]
     BEM Block: .blog-list
-->

<style>
/* Blog List Block */
.blog-list {
    padding: 4rem 1.5rem;
    background: #fff;
}

.blog-list__container {
    max-width: 1200px;
    margin-inline: auto;
}

.blog-list__layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 4rem;
}

/* Main Content */
.blog-list__main {
    min-width: 0;
}

.blog-list__header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 2px solid #f1f5f9;
}

.blog-list__title {
    font-size: 1.75rem;
    font-weight: 800;
    color: #0f172a;
    margin: 0;
}

.blog-list__count {
    font-size: 0.938rem;
    color: #64748b;
    margin: 0;
}

/* List Items */
.blog-list__items {
    display: flex;
    flex-direction: column;
}

.blog-list__item {
    padding: 1.5rem 0;
    border-bottom: 1px solid #f1f5f9;
}

.blog-list__item:first-child {
    padding-top: 0;
}

.blog-list__item-link {
    display: grid;
    grid-template-columns: 1fr 140px;
    gap: 1.5rem;
    align-items: center;
    text-decoration: none;
    color: inherit;
}

.blog-list__item-link:hover .blog-list__item-title {
    color: #6366f1;
}

/* Item Content */
.blog-list__item-content {
    min-width: 0;
}

.blog-list__item-meta {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.5rem;
    font-size: 0.813rem;
}

.blog-list__item-category {
    color: #6366f1;
    font-weight: 600;
}

.blog-list__item-date {
    color: #94a3b8;
}

.blog-list__item-title {
    font-size: 1.125rem;
    font-weight: 700;
    line-height: 1.4;
    color: #0f172a;
    margin: 0 0 0.5rem;
    transition: color 0.2s ease;
}

.blog-list__item-excerpt {
    font-size: 0.938rem;
    line-height: 1.6;
    color: #64748b;
    margin: 0;
}

/* Item Image */
.blog-list__item-image {
    margin: 0;
    border-radius: 8px;
    overflow: hidden;
    aspect-ratio: 3 / 2;
}

.blog-list__item-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Pagination */
.blog-list__pagination {
    margin-top: 3rem;
    padding-top: 2rem;
    border-top: 2px solid #f1f5f9;
}

/* Sidebar */
.blog-list__sidebar {
    position: sticky;
    top: 2rem;
    align-self: start;
}

/* Widget Element */
.blog-list__widget {
    margin-bottom: 2rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid #f1f5f9;
}

.blog-list__widget:last-child {
    margin-bottom: 0;
    padding-bottom: 0;
    border-bottom: none;
}

.blog-list__widget-title {
    font-size: 0.875rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #0f172a;
    margin: 0 0 1rem;
}

/* Search Widget */
.blog-list__search {
    display: flex;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.2s ease;
}

.blog-list__search:focus-within {
    border-color: #6366f1;
}

.blog-list__search-input {
    flex: 1;
    padding: 0.75rem 1rem;
    border: none;
    font-size: 0.938rem;
    outline: none;
}

.blog-list__search-button {
    padding: 0.75rem;
    background: #f8fafc;
    border: none;
    cursor: pointer;
    color: #64748b;
    transition: color 0.2s ease, background 0.2s ease;
}

.blog-list__search-button:hover {
    background: #6366f1;
    color: #fff;
}

/* Category List */
.blog-list__categories {
    list-style: none;
    padding: 0;
    margin: 0;
}

.blog-list__category-item {
    margin-bottom: 0.5rem;
}

.blog-list__category-link {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0;
    text-decoration: none;
    color: #475569;
    font-size: 0.938rem;
    transition: color 0.2s ease;
}

.blog-list__category-link:hover {
    color: #6366f1;
}

.blog-list__category-count {
    font-size: 0.813rem;
    color: #94a3b8;
}

/* Popular Posts */
.blog-list__popular {
    list-style: none;
    padding: 0;
    margin: 0;
}

.blog-list__popular-item {
    margin-bottom: 1rem;
}

.blog-list__popular-item:last-child {
    margin-bottom: 0;
}

.blog-list__popular-link {
    display: flex;
    gap: 0.75rem;
    text-decoration: none;
    color: inherit;
}

.blog-list__popular-image {
    margin: 0;
    width: 60px;
    height: 60px;
    border-radius: 6px;
    overflow: hidden;
    flex-shrink: 0;
}

.blog-list__popular-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.blog-list__popular-content {
    min-width: 0;
}

.blog-list__popular-title {
    font-size: 0.875rem;
    font-weight: 600;
    line-height: 1.4;
    color: #0f172a;
    margin: 0 0 0.25rem;
    transition: color 0.2s ease;
}

.blog-list__popular-link:hover .blog-list__popular-title {
    color: #6366f1;
}

.blog-list__popular-date {
    font-size: 0.75rem;
    color: #94a3b8;
}

/* Tags Cloud */
.blog-list__tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
}

.blog-list__tag {
    display: inline-block;
    padding: 0.375rem 0.75rem;
    background: #f1f5f9;
    color: #475569;
    font-size: 0.813rem;
    font-weight: 500;
    text-decoration: none;
    border-radius: 100px;
    transition: all 0.2s ease;
}

.blog-list__tag:hover {
    background: #6366f1;
    color: #fff;
}

/* Responsive */
@media (max-width: 900px) {
    .blog-list__layout {
        grid-template-columns: 1fr;
    }

    .blog-list__sidebar {
        position: static;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 2rem;
        padding-top: 2rem;
        border-top: 2px solid #f1f5f9;
    }

    .blog-list__widget {
        margin-bottom: 0;
        padding-bottom: 0;
        border-bottom: none;
    }
}

@media (max-width: 640px) {
    .blog-list {
        padding: 3rem 1rem;
    }

    .blog-list__item-link {
        grid-template-columns: 1fr;
    }

    .blog-list__item-image {
        order: -1;
        width: 100%;
        aspect-ratio: 16 / 9;
    }

    .blog-list__sidebar {
        grid-template-columns: 1fr;
    }
}
</style>

<section class="blog-list" aria-labelledby="blog-list-heading">
    <div class="blog-list__container">

        <div class="blog-list__layout">

            <!-- Main Content -->
            <main class="blog-list__main">
                <header class="blog-list__header">
                    <h1 class="blog-list__title" id="blog-list-heading">All Articles</h1>
                    <p class="blog-list__count">
                        <Loop type=post><Field loop_total /></Loop> articles found
                    </p>
                </header>

                <div class="blog-list__items">
                    <Loop type=post count=10 paged=true orderby=date order=DESC>
                        <article class="blog-list__item">
                            <a href="{Field url}" class="blog-list__item-link">
                                <div class="blog-list__item-content">
                                    <div class="blog-list__item-meta">
                                        <If field=terms taxonomy=category>
                                            <span class="blog-list__item-category">
                                                <Field terms taxonomy=category count=1 />
                                            </span>
                                        </If>
                                        <time class="blog-list__item-date" datetime="{Field publish_date date_format='Y-m-d'}">
                                            <Field publish_date date_format="M j, Y" />
                                        </time>
                                    </div>

                                    <h2 class="blog-list__item-title">
                                        <Field title />
                                    </h2>

                                    <p class="blog-list__item-excerpt">
                                        <Field excerpt words=25 />
                                    </p>
                                </div>

                                <figure class="blog-list__item-image">
                                    <If field=image_url>
                                        <img src="{Field image_url size=thumbnail}"
                                             alt="{Field image_alt}"
                                             loading="lazy"
                                             width="140"
                                             height="93">
                                    </If>
                                </figure>
                            </a>
                        </article>
                    </Loop>
                </div>

                <nav class="blog-list__pagination" aria-label="Blog pagination">
                    <PaginateButtons />
                </nav>
            </main>

            <!-- Sidebar -->
            <aside class="blog-list__sidebar" aria-labelledby="sidebar-heading">

                <!-- Search -->
                <div class="blog-list__widget">
                    <h3 class="blog-list__widget-title" id="sidebar-heading">Search</h3>
                    <form action="/search/" method="get" class="blog-list__search">
                        <input type="search" name="q" placeholder="Search articles..." class="blog-list__search-input" aria-label="Search articles">
                        <button type="submit" class="blog-list__search-button" aria-label="Submit search">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                <circle cx="11" cy="11" r="8"/>
                                <path d="m21 21-4.35-4.35"/>
                            </svg>
                        </button>
                    </form>
                </div>

                <!-- Categories -->
                <div class="blog-list__widget">
                    <h3 class="blog-list__widget-title">Categories</h3>
                    <nav aria-label="Blog categories">
                        <ul class="blog-list__categories">
                            <Loop taxonomy=category orderby=count order=DESC count=8>
                                <li class="blog-list__category-item">
                                    <a href="{Field url}" class="blog-list__category-link">
                                        <Field title />
                                        <span class="blog-list__category-count">(<Field count />)</span>
                                    </a>
                                </li>
                            </Loop>
                        </ul>
                    </nav>
                </div>

                <!-- Popular Posts -->
                <div class="blog-list__widget">
                    <h3 class="blog-list__widget-title">Popular Articles</h3>
                    <ul class="blog-list__popular">
                        <Loop type=post count=5 orderby=comment_count order=DESC>
                            <li class="blog-list__popular-item">
                                <a href="{Field url}" class="blog-list__popular-link">
                                    <figure class="blog-list__popular-image">
                                        <If field=image_url>
                                            <img src="{Field image_url size=thumbnail}"
                                                 alt=""
                                                 loading="lazy"
                                                 width="60"
                                                 height="60">
                                        </If>
                                    </figure>
                                    <div class="blog-list__popular-content">
                                        <h4 class="blog-list__popular-title"><Field title /></h4>
                                        <time class="blog-list__popular-date" datetime="{Field publish_date date_format='Y-m-d'}">
                                            <Field publish_date date_format="M j" />
                                        </time>
                                    </div>
                                </a>
                            </li>
                        </Loop>
                    </ul>
                </div>

                <!-- Tags Cloud -->
                <div class="blog-list__widget">
                    <h3 class="blog-list__widget-title">Tags</h3>
                    <div class="blog-list__tags">
                        <Loop taxonomy=post_tag orderby=count order=DESC count=15>
                            <a href="{Field url}" class="blog-list__tag">
                                <Field title />
                            </a>
                        </Loop>
                    </div>
                </div>

            </aside>

        </div>

    </div>
</section>
