<!-- Header: Complete Navigation
     Usage: [template name=header-navigation]
     BEM Block: .header
-->

<style>
/* Header Block */
.header {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: #fff;
    border-bottom: 1px solid #e2e8f0;
}

.header__container {
    max-width: 1400px;
    margin-inline: auto;
    padding: 1rem 1.5rem;
}

.header__nav {
    display: flex;
    align-items: center;
    gap: 3rem;
}

/* Logo */
.header__logo {
    display: inline-block;
}

.header__logo img {
    display: block;
    height: 32px;
    width: auto;
}

/* Menu */
.header__menu {
    flex: 1;
}

.header__list {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    list-style: none;
    padding: 0;
    margin: 0;
}

.header__link {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    padding: 0.625rem 1rem;
    font-size: 0.9375rem;
    font-weight: 600;
    color: #475569;
    text-decoration: none;
    border-radius: 8px;
    transition: all 0.2s ease;
}

.header__link:hover,
.header__link--active {
    color: #0f172a;
    background: #f8fafc;
}

/* Actions */
.header__actions {
    display: flex;
    align-items: center;
    gap: 1rem;
}

.header__button {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.625rem 1.5rem;
    font-size: 0.9375rem;
    font-weight: 600;
    text-decoration: none;
    border-radius: 8px;
    transition: all 0.2s ease;
    border: 2px solid transparent;
}

.header__button--primary {
    background: #6366f1;
    color: #fff;
}

.header__button--primary:hover {
    background: #4f46e5;
}

/* Mobile Toggle */
.header__toggle {
    display: none;
    flex-direction: column;
    gap: 4px;
    width: 24px;
    height: 20px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
}

.header__toggle-bar {
    width: 100%;
    height: 2px;
    background: #0f172a;
    transition: all 0.3s ease;
}

.header__toggle--active .header__toggle-bar:nth-child(1) {
    transform: translateY(6px) rotate(45deg);
}

.header__toggle--active .header__toggle-bar:nth-child(2) {
    opacity: 0;
}

.header__toggle--active .header__toggle-bar:nth-child(3) {
    transform: translateY(-6px) rotate(-45deg);
}

/* Responsive */
@media (max-width: 900px) {
    .header__menu {
        position: fixed;
        top: 65px;
        left: 0;
        right: 0;
        background: #fff;
        border-bottom: 1px solid #e2e8f0;
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
    }

    .header__menu--active {
        max-height: 500px;
    }

    .header__list {
        flex-direction: column;
        align-items: stretch;
        padding: 1rem;
    }

    .header__toggle {
        display: flex;
    }

    .header__actions {
        display: none;
    }
}
</style>

<header class="header" role="banner">
    <div class="header__container">
        <nav class="header__nav" aria-label="Main navigation">
            <a href="/" class="header__logo" aria-label="Home">
                <img src="/assets/logo.svg" alt="Company" width="120" height="32">
            </a>

            <div class="header__menu" id="main-menu">
                <ul class="header__list">
                    <li><a href="/products/" class="header__link">Products</a></li>
                    <li><a href="/pricing/" class="header__link">Pricing</a></li>
                    <li><a href="/docs/" class="header__link">Docs</a></li>
                    <li><a href="/blog/" class="header__link">Blog</a></li>
                    <li><a href="/about/" class="header__link">About</a></li>
                </ul>
            </div>

            <div class="header__actions">
                <a href="/login/" class="header__link">Log in</a>
                <a href="/signup/" class="header__button header__button--primary">Get Started</a>
            </div>

            <button type="button"
                    class="header__toggle"
                    aria-label="Toggle menu"
                    aria-expanded="false"
                    aria-controls="main-menu">
                <span class="header__toggle-bar"></span>
                <span class="header__toggle-bar"></span>
                <span class="header__toggle-bar"></span>
            </button>
        </nav>
    </div>
</header>

<script>
(function() {
    const toggle = document.querySelector('.header__toggle');
    const menu = document.querySelector('.header__menu');

    if (toggle && menu) {
        toggle.addEventListener('click', function() {
            const isExpanded = this.getAttribute('aria-expanded') === 'true';
            this.setAttribute('aria-expanded', !isExpanded);
            this.classList.toggle('header__toggle--active');
            menu.classList.toggle('header__menu--active');
        });
    }
})();
</script>
