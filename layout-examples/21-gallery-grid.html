<!-- Gallery: Grid Layout
     Usage: [template name=gallery-grid]
     BEM Block: .gallery
-->

<style>
/* Gallery Block */
.gallery {
    padding: 5rem 1.5rem;
    background: #fff;
}

.gallery__container {
    max-width: 1400px;
    margin-inline: auto;
}

/* Header */
.gallery__header {
    text-align: center;
    margin-bottom: 3rem;
}

.gallery__label {
    display: inline-block;
    font-size: 0.875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #6366f1;
    margin-bottom: 0.75rem;
}

.gallery__title {
    font-size: clamp(2rem, 4vw, 2.75rem);
    font-weight: 800;
    line-height: 1.2;
    letter-spacing: -0.02em;
    color: #0f172a;
    margin: 0 0 1rem;
}

.gallery__subtitle {
    font-size: 1.125rem;
    line-height: 1.6;
    color: #475569;
    margin: 0;
}

/* Filters */
.gallery__filters {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    justify-content: center;
    margin-bottom: 3rem;
}

.gallery__filter {
    padding: 0.625rem 1.25rem;
    font-size: 0.9375rem;
    font-weight: 600;
    color: #475569;
    background: transparent;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.gallery__filter:hover {
    border-color: #6366f1;
    color: #6366f1;
}

.gallery__filter--active {
    background: #6366f1;
    border-color: #6366f1;
    color: #fff;
}

/* Grid */
.gallery__grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 2rem;
    margin-bottom: 3rem;
}

/* Item */
.gallery__item {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    background: #f8fafc;
    transition: transform 0.3s ease, opacity 0.3s ease;
}

.gallery__item--hidden {
    display: none;
}

.gallery__item:hover {
    transform: translateY(-4px);
}

.gallery__link {
    display: block;
    position: relative;
    text-decoration: none;
    color: inherit;
}

.gallery__image {
    margin: 0;
    background: #e2e8f0;
    aspect-ratio: 4 / 3;
    overflow: hidden;
}

.gallery__image img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
}

.gallery__item:hover .gallery__image img {
    transform: scale(1.05);
}

.gallery__overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(15, 23, 42, 0.9) 0%, transparent 60%);
    display: flex;
    align-items: flex-end;
    padding: 1.5rem;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.gallery__item:hover .gallery__overlay {
    opacity: 1;
}

.gallery__content {
    color: #fff;
    width: 100%;
}

.gallery__category {
    display: inline-block;
    padding: 0.25rem 0.75rem;
    background: rgba(99, 102, 241, 0.9);
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-radius: 4px;
    margin-bottom: 0.75rem;
}

.gallery__item-title {
    font-size: 1.125rem;
    font-weight: 700;
    margin: 0 0 0.5rem;
}

.gallery__view {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.875rem;
    font-weight: 600;
    color: rgba(255,255,255,0.95);
    transition: gap 0.2s ease;
}

.gallery__item:hover .gallery__view {
    gap: 0.75rem;
}

/* Footer */
.gallery__footer {
    text-align: center;
}

.gallery__load-more {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 1rem 2.5rem;
    font-size: 1rem;
    font-weight: 600;
    color: #0f172a;
    background: transparent;
    border: 2px solid #cbd5e1;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.gallery__load-more:hover {
    border-color: #0f172a;
    background: #0f172a;
    color: #fff;
}

/* Responsive */
@media (max-width: 900px) {
    .gallery {
        padding: 4rem 1rem;
    }

    .gallery__grid {
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.5rem;
    }
}

@media (max-width: 640px) {
    .gallery {
        padding: 3rem 1rem;
    }

    .gallery__header {
        margin-bottom: 2rem;
    }

    .gallery__filters {
        margin-bottom: 2rem;
    }

    .gallery__grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
        margin-bottom: 2rem;
    }
}
</style>

<section class="gallery" id="gallery" aria-labelledby="gallery-heading">
    <div class="gallery__container">

        <header class="gallery__header">
            <span class="gallery__label">Gallery</span>
            <h2 class="gallery__title" id="gallery-heading">Our Work</h2>
            <p class="gallery__subtitle">
                A showcase of our best projects and creative endeavors
            </p>
        </header>

        <!-- Filter Navigation -->
        <nav class="gallery__filters" aria-label="Gallery filters">
            <button class="gallery__filter gallery__filter--active" data-filter="all" aria-pressed="true">
                All
            </button>
            <Loop taxonomy=portfolio_category orderby=name order=ASC>
                <button class="gallery__filter" data-filter="{Field slug}" aria-pressed="false">
                    <Field title />
                </button>
            </Loop>
        </nav>

        <!-- Gallery Grid -->
        <div class="gallery__grid" role="list">
            <Loop type=portfolio count=12 orderby=date order=DESC>
                <article class="gallery__item" role="listitem" data-category="{Field terms taxonomy=portfolio_category field=slug}">
                    <a href="{Field url}" class="gallery__link">
                        <figure class="gallery__image">
                            <If field=featured_image>
                                <img src="{Field featured_image size=medium_large}"
                                     alt="{Field image_alt}"
                                     loading="lazy"
                                     width="400"
                                     height="300">
                            </If>
                            <figcaption class="gallery__overlay">
                                <div class="gallery__content">
                                    <If field=terms taxonomy=portfolio_category>
                                        <span class="gallery__category">
                                            <Field terms taxonomy=portfolio_category count=1 />
                                        </span>
                                    </If>
                                    <h3 class="gallery__item-title"><Field title /></h3>
                                    <span class="gallery__view" aria-hidden="true">
                                        View Project
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                                    </span>
                                </div>
                            </figcaption>
                        </figure>
                    </a>
                </article>
            </Loop>
        </div>

        <!-- Load More -->
        <footer class="gallery__footer">
            <button class="gallery__load-more" type="button" data-page="1">
                Load More Projects
            </button>
        </footer>

    </div>
</section>

<script>
(function() {
    // Filter functionality
    const filters = document.querySelectorAll('.gallery__filter');
    const items = document.querySelectorAll('.gallery__item');

    filters.forEach(filter => {
        filter.addEventListener('click', function() {
            const category = this.getAttribute('data-filter');

            // Update active state
            filters.forEach(f => {
                f.classList.remove('gallery__filter--active');
                f.setAttribute('aria-pressed', 'false');
            });
            this.classList.add('gallery__filter--active');
            this.setAttribute('aria-pressed', 'true');

            // Filter items
            items.forEach(item => {
                const itemCategories = item.getAttribute('data-category');
                if (category === 'all' || itemCategories.includes(category)) {
                    item.classList.remove('gallery__item--hidden');
                } else {
                    item.classList.add('gallery__item--hidden');
                }
            });
        });
    });
})();
</script>
