<!-- Hero: Video Background -->
<section class="hero-video block-triple-tb position-relative overflow-hidden" aria-labelledby="hero-video-heading">

    <div class="hero-video-bg" aria-hidden="true">
        <video autoplay muted loop playsinline>
            <source src="/assets/videos/hero-bg.mp4" type="video/mp4">
        </video>
        <div class="hero-video-overlay"></div>
    </div>

    <div class="inner position-relative z-1" style="padding-inline: var(--space-s);">

        <div class="text-center text-white" style="max-width: 900px; margin-inline: auto;">

            <h1 class="hero-title hero-title--large mb-single" id="hero-video-heading">
                Experience Innovation Like Never Before
            </h1>

            <p class="hero-subtitle mb-single-half">
                Join thousands of creators, developers, and visionaries who are
                shaping the future with our revolutionary platform.
            </p>

            <div class="hero-actions mb-double">
                <a href="/explore/" class="button button-white button-lg">
                    Explore Now
                </a>
                <button type="button" class="button button-ghost-white button-lg hero-play-btn" aria-label="Play introduction video">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    Watch Video
                </button>
            </div>

            <div class="hero-stats grid-3 gap-double">
                <div class="stat-item">
                    <span class="stat-number">50K+</span>
                    <span class="stat-label">Active Users</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number">99.9%</span>
                    <span class="stat-label">Uptime</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number">150+</span>
                    <span class="stat-label">Countries</span>
                </div>
            </div>

        </div>

    </div>

</section>
